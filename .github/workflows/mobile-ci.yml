name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'platform/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform/mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ./platform/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            platform/mobile/node_modules
            platform/mobile/apps/client/node_modules
            platform/mobile/apps/restaurant/node_modules
            platform/mobile/shared/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('platform/mobile/package-lock.json') }}
          restore-keys: |
            mobile-node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci --forceExit --detectOpenHandles
        env:
          CI: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: platform/mobile/coverage/
          retention-days: 14
          if-no-files-found: ignore
